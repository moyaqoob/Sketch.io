# fly.toml app configuration file generated for sketch-io on 2026-06-08T17:24:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sketch-io'
primary_region = 'bom'

[build]
  dockerfile = "apps/cosketch-websocket/Dockerfile"

[ws_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
