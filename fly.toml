# fly.toml app configuration file generated for sketch-io on 2026-06-08T12:46:24Z
#
# Deploy from the monorepo root so Docker can COPY packages/ and apps/cosketch-backend/.
# See https://fly.io/docs/launch/monorepo/

app = 'sketch-io'
primary_region = 'iad'

[build]
  dockerfile = "apps/cosketch-backend/Dockerfile"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
